debug: True
SAVE_VIDEO: False
SAVE_RENDER: True
HEADLESS: False
USE_ARTI: True

steps: 1000
num_envs: 1
env_spacing: 1.5

# hand
hand:
  urdf: smplx_right_hand_floating.urdf   # relative to hand_asset_root
  hand_asset_root: .
  hand_scale: 1.0        # adjust if hand is too large/small relative to objects
  hand_pose_p: [0, 0, 0] # base position (overridden by virtual joints)

# cam
cam:
  use_cam: True
  cam_w: 1080
  cam_h: 720
  cam_far_plane: 100
  cam_near_plane: 0.05
  cam_horizontal_fov: 60
  cam_poss:
    - [0.5, 0.7, 1.2]
    - [0, 0, 1.2]
  cam_targets:
    - [0.5, 0, 0.5]
    - [0.5, 0, 0.15]
  point_cloud_bound:
    - [-1, 1]
    - [-1, 1]
    - [0.1, 1.0]
  sampling_method: random_fps
  sampling_num: 20000

# articulated object
asset:
  asset_root: assets
  arti_obj_root: gapartnet_example
  arti_gapartnet_ids:
    - 45661
  arti_obj_pose_ps:
    - [0.5, 0, 0.6]
  arti_position_noise: 0.0
  arti_rotation_noise: 0.0
  arti_obj_scale: 0.4
  arti_rotation: 0

  # table
  table_pose_p: [0.7, 0, 0.01]
  table_scale: [1.2, 2, 0.02]

# drag motion parameters
drag:
  pre_grasp_offset: 0.15    # metres in front of handle before grasping
  grasp_approach_steps: 50  # sim steps for approach
  grasp_settle_steps: 40    # sim steps to close fingers
  drag_distance: 0.50       # metres to pull (prismatic joints)
  drag_angle: 60            # degrees to rotate (revolute/hinge joints)
  drag_steps: 180           # sim steps for the drag
  post_drag_steps: 60       # sim steps after release

# data saving
save:
  root: output/hand_drag
  save_hand_state: True
  save_object_state: True
  save_video: False
  save_point_cloud: False
