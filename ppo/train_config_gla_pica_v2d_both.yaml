params:
  seed: 42

  algo:
    name: pica_a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: gla_actor_critic
    separate: false
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: -2.0
        fixed_sigma: true
    mlp:
      units: [512, 512, 256]
      activation: elu
      initializer:
        name: default
      regularizer:
        name: None
    gla:
      history_length: 16
      token_dim: 102
      hidden_size: 128
      num_heads: 4
      expand_k: 0.5
      expand_v: 1.0
      mode: chunk
      pool: last

  load_checkpoint: false

  config:
    name: HandDrag
    full_experiment_name: hand_drag_gla_45936_pica_drand12_aux_v2c_both_50ep
    env_name: hand_drag
    multi_gpu: false
    ppo: true
    mixed_precision: false
    normalize_input: true
    normalize_value: true
    value_bootstrap: true
    num_actors: 64
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: true
    gamma: 0.99
    tau: 0.95
    learning_rate: 3.0e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 100000
    max_epochs: 50
    save_best_after: 200
    save_frequency: 500
    print_stats: true
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: true
    e_clip: 0.2
    horizon_length: 32
    minibatch_size: 32768
    mini_epochs: 5
    critic_coef: 1.0
    clip_value: true
    seq_length: 4
    bounds_loss_coef: 0.01

    physical_regularization:
      enabled: true
      action_bound:     { enabled: true, threshold: 0.90, weight: 20.0 }
      contact_distance: { enabled: true, safe_dist: 0.08, weight: 0.5 }
      slip_action:      { enabled: false, weight: 0.0 }
      action_smoothness: { enabled: false, weight: 0.0 }

    dynamics_randomization:
      enabled: true
      damping_scale:  { enabled: true,  range: [1.0, 2.0] }
      friction_scale: { enabled: false, range: [1.0, 1.0] }

    physical_auxiliary:
      enabled: true
      mode: causal_horizon
      horizon: 5
      targets:
        q_response_K:    { enabled: true }
        max_dist_K:      { enabled: true }
        detach_proxy_K:  { enabled: true }
        tracking_stress: { enabled: true }
      weights:
        q_response_K:    1.0
        max_dist_K:      1.0
        detach_proxy_K:  0.5
        tracking_stress: 0.5
      gating: { enabled: false, d_valid: 0.10, sharpness: 80.0 }
      warmup:
        enabled: true
        start_epoch: 10
        end_epoch:   40
        max_weight:  0.01

    aram:
      enabled: true
      start_after_success: 0.7
      target_clip:         0.7
      lambda_lr:           0.005
      lambda_max:          1.0
      lambda_init:         0.0
      resistance_gate:
        enabled:         true
        min_action_l2:   1.0
        min_stall_steps: 5
        q_response_min:  0.005
        contact_dist:    0.10
      effort_penalty:
        type: action_l2
        weight_mode: adaptive

    reconfig_reward:
      enabled:                  true
      contact_dist:             0.10
      min_action_l2:            1.0
      progress_stall_threshold: 0.02
      cooldown_steps:           10
      weight_contact_improve:   0.2
      weight_response_improve:  1.0
      weight_slip_reduce:       0.5
      action_delta_threshold:   4.0
      hand_velocity_threshold:  8.0
